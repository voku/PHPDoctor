name: Release

on:
  push:
    tags:
      - "*.*.*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and release"
        required: true
        type: string

jobs:
  build-phar:
    name: "Build & Release PHAR"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release_tag.outputs.tag }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2
          ini-values: phar.readonly=0

      - name: Install production dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Download Box
        run: |
          curl -L https://github.com/box-project/box/releases/latest/download/box.phar -o box.phar
          php box.phar --version

      - name: Build PHAR
        run: php box.phar compile --config=box.json.dist

      - name: Verify PHAR
        run: |
          php phpdoctor.phar analyse --help

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: phpdoctor.phar
          generate_release_notes: ${{ toJSON(github.event_name == 'push') }}
          # Allow retry runs for an existing tag to replace the previously uploaded PHAR asset.
          overwrite_files: true
