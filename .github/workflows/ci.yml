name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  tests:
    name: "Tests – PHP ${{ matrix.php }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        php:
          - "8.1"
          - "8.2"
          - "8.3"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-php-${{ matrix.php }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-composer-

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --optimize-autoloader

      - name: Run PHPUnit
        run: vendor/bin/phpunit --no-coverage

  static-analysis:
    name: "Static analysis (PHPStan)"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-php-8.3-phpstan-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-8.3-phpstan-

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --optimize-autoloader

      - name: Install PHPStan
        run: composer require --no-interaction --prefer-dist phpstan/phpstan

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

  self-check:
    name: "PHPDoctor self-check"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-php-8.3-self-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-8.3-self-

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --optimize-autoloader

      - name: Run PHPDoctor on itself
        run: |
          output=$(php bin/phpdoctor analyse src 2>&1)
          echo "$output"
          if echo "$output" | grep -qE '^[1-9][0-9]* errors detected\.[[:space:]]*$'; then
            exit 1
          fi
